# ============================================================
# Awesome Video Prompts (Next.js) — Cloudflare Workers config
# 部署目标: Cloudflare Workers (via OpenNext)
# 数据存储: D1 (prompts-db) + R2 (媒体)
# ============================================================

name = "awesome-video-prompts-nextjs"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".open-next/assets"

# ============================================================
# D1: prompts 元数据存储
# database_id 在生产 wrangler secret 注入；本地默认占位
# ============================================================
[[d1_databases]]
binding = "DB"
database_name = "prompts-db"
database_id = "REPLACE_WITH_YOUR_D1_ID"

# ============================================================
# R2: 视频/封面图托管
# 通过自定义域 static.awesomevideoprompts.com 公开访问
# （bucket_name 待 Phase 3 实装时填入）
# ============================================================
[[r2_buckets]]
binding = "MEDIA"
bucket_name = "REPLACE_WITH_YOUR_R2_BUCKET"

# ============================================================
# 环境变量
# 生产环境在 Cloudflare Dashboard 或 wrangler secret 注入
# ============================================================
[vars]
NEXT_PUBLIC_SITE_URL = "https://awesomevideoprompts.com"
NEXT_PUBLIC_R2_PUBLIC_URL = "https://static.awesomevideoprompts.com"

# ============================================================
# 部署环境（dev / staging / production）
# ============================================================
[env.dev]
name = "awesome-video-prompts-nextjs-dev"
vars = { NEXT_PUBLIC_SITE_URL = "http://localhost:3000" }

[env.staging]
name = "awesome-video-prompts-nextjs-staging"

[env.production]
name = "awesome-video-prompts-nextjs"