# ============================================================
# Awesome Video Prompts (Next.js) — Cloudflare Workers config
# 部署目标: Cloudflare Workers (via OpenNext)
# 数据存储: D1 (prompts-db) + R2 (媒体)
# ============================================================

name = "awesome-video-prompts-nextjs"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
main = ".open-next/worker.js"
assets = { directory = ".open-next/assets", binding = "ASSETS" }

# ============================================================
# D1: prompts 元数据存储
# database_id 从 .dev.vars 的 D1_DATABASE_ID 读；本文件保留生产值
# ============================================================
[[d1_databases]]
binding = "DB"
database_name = "awesomevideoprompts-db"
database_id = "486ccac9-d364-4db4-b911-d4a420bcbc6c"

# ============================================================
# R2: 视频/封面图托管
# 通过自定义域 static.awesomevideoprompts.com 公开访问
# ============================================================
[[r2_buckets]]
binding = "MEDIA"
bucket_name = "awesome-video-prompts-media"

# ============================================================
# 环境变量
# 生产环境在 Cloudflare Dashboard 或 wrangler secret 注入
# ============================================================
[vars]
NEXT_PUBLIC_SITE_URL = "https://awesome-video-prompts-nextjs.semonxue.workers.dev"
NEXT_PUBLIC_R2_PUBLIC_URL = "https://static.awesomevideoprompts.com"
# REVALIDATE_SECRET 必须通过 wrangler secret put revalidate-secret 设置，不写在此文件
# ADMIN_SECRET 也必须通过 wrangler secret put admin-secret 设置（md-editor publish 调用）
# wrangler secret put revalidate-secret --name awesome-video-prompts-nextjs
# wrangler secret put admin-secret --name awesome-video-prompts-nextjs

# ============================================================
# 部署环境（dev / staging / production）
# ============================================================
[env.dev]
name = "awesome-video-prompts-nextjs-dev"
vars = { NEXT_PUBLIC_SITE_URL = "http://localhost:3000" }

[env.staging]
name = "awesome-video-prompts-nextjs-staging"

[env.production]
name = "awesome-video-prompts-nextjs"